name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: pms_test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run lint:check

      - name: Security Audit (NPM)
        run: npm audit --omit=dev --audit-level=high

      - name: Wait for Database
        run: |
          echo "Waiting for MySQL to be ready..."
          until nc -z 127.0.0.1 3306; do
            echo "MySQL not ready yet, retrying in 2 seconds..."
            sleep 2
          done
          echo "MySQL is up and running!"

      - name: Run migrations
        run: npx knex migrate:latest
        env:
          NODE_ENV: test
          DB_NAME: pms_test_db
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run Stability Tests (Vitest)
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
          DB_NAME: pms_test_db
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run lint:check

      - name: Security Audit (NPM)
        run: npm audit --omit=dev --audit-level=high

      - name: Build production bundle
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
